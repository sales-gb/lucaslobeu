name = "lucaslobeu-portfolio"
main = ".open-next/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 binding — set DB_NAME to your D1 database name before deploying
[[d1_databases]]
binding = "DB"
database_name = "lucaslobeu-db"
database_id = "REPLACE_WITH_D1_ID"

# R2 binding — set bucket_name before deploying
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "lucaslobeu-media"

# KV for session storage (optional, NextAuth uses JWT)
# [[kv_namespaces]]
# binding = "KV"
# id = "REPLACE_WITH_KV_ID"

[vars]
NODE_ENV = "production"
NEXTAUTH_URL = "https://lucaslobeu.com"
# NEXTAUTH_SECRET is set as a secret via: wrangler secret put NEXTAUTH_SECRET
